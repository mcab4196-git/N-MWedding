<title>Save the Date — Noriel &amp; Ma. Cristina</title>
<meta name="description" content="Noriel & Ma. Cristina are getting married — July 18, 2026, Talisay, Batangas." />

<style>
  :root{
    --emerald:#1F4A33; --emerald-deep:#143625; --gold:#B79A5B; --gold-soft:#d9c79b;
    --ivory:#FBFAF5; --glow:#4d8355;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Montserrat",sans-serif;color:#eef3ee;text-align:center;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:46px 22px;
    background:radial-gradient(120% 90% at 50% 0%,#2e6b47 0%,#1f4a33 45%,#143625 100%);
    position:relative;overflow:hidden;
  }
  .corner{position:absolute;width:min(40vw,300px);pointer-events:none;z-index:1;}
  .corner img{display:block;width:100%;}
  .c-tr{top:0;right:0;-webkit-mask-image:radial-gradient(165% 165% at 100% 0%,#000 56%,transparent 90%);mask-image:radial-gradient(165% 165% at 100% 0%,#000 56%,transparent 90%);}
  .c-bl{bottom:0;left:0;width:min(36vw,260px);-webkit-mask-image:radial-gradient(165% 165% at 0% 100%,#000 56%,transparent 90%);mask-image:radial-gradient(165% 165% at 0% 100%,#000 56%,transparent 90%);}
  .c-bl img{transform:scaleX(-1);}
  .card{position:relative;z-index:2;max-width:540px;width:100%;}
  .eyebrow{font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold-soft);}
  .mono{font-family:"Cormorant Garamond",serif;font-size:1.7rem;letter-spacing:.18em;color:var(--gold);margin:14px 0 22px;}
  .photo{
    width:clamp(220px,62vw,300px);aspect-ratio:3/4;margin:0 auto 26px;overflow:hidden;
    border:1px solid rgba(217,199,155,.6);padding:8px;
    border-radius:150px 150px 12px 12px;background:rgba(255,255,255,.04);
  }
  .photo img{width:100%;height:100%;object-fit:cover;object-position:50% 45%;border-radius:144px 144px 8px 8px;display:block;}
  .names{font-family:"Pinyon Script",cursive;font-size:clamp(2.8rem,11vw,4.3rem);line-height:1;color:#fff;margin:6px 0 4px;}
  .amp{display:block;font-size:.5em;color:var(--gold-soft);margin:2px 0;}
  .save{font-family:"Cormorant Garamond",serif;font-size:1.5rem;letter-spacing:.3em;text-transform:uppercase;color:#eef3ee;margin:18px 0 6px;}
  .date{font-size:.82rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-soft);}
  .place{font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:#a9c2b1;margin-top:8px;}
  .cd{display:flex;justify-content:center;gap:clamp(14px,5vw,30px);margin:30px 0 28px;}
  .cd div{min-width:54px;}
  .cd .n{font-family:"Cormorant Garamond",serif;font-size:clamp(1.8rem,7vw,2.6rem);color:#fff;line-height:1;}
  .cd .l{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-soft);margin-top:6px;}
  .rule{width:54px;height:1px;background:var(--gold);margin:0 auto 26px;opacity:.7;}
  .btn{
    display:inline-block;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;
    color:var(--emerald-deep);background:var(--gold-soft);padding:14px 30px;text-decoration:none;
    border:1px solid var(--gold-soft);transition:background .25s,color .25s;
  }
  .btn:hover{background:transparent;color:var(--gold-soft);}
</style>

<script>
  const TARGET = new Date("2026-07-18T08:00:00+08:00").getTime();
  const el = id => document.getElementById(id);
  function tick(){
    const diff = TARGET - Date.now();
    if(diff <= 0){ el("cd").innerHTML = '<div style="font-family:Cormorant Garamond,serif;font-size:1.6rem;color:#fff">It\'s our wedding day! 🌿</div>'; return; }
    const d = Math.floor(diff/86400000),
          h = Math.floor(diff%86400000/3600000),
          m = Math.floor(diff%3600000/60000),
          s = Math.floor(diff%60000/1000);
    el("d").textContent=d; el("h").textContent=String(h).padStart(2,"0");
    el("m").textContent=String(m).padStart(2,"0"); el("s").textContent=String(s).padStart(2,"0");
  }
  tick(); setInterval(tick,1000);
</script>
